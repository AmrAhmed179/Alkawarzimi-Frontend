<div class="bg-app-bar border-b sticky left-0 flex h-16 items-center gap-5 ">
    <div class="flex justify-start items-center w-full px-6">
        <div>
            <h2 class="title my-0 pr-4 mr-4 border-r hidden sm:block flex-none">
                @{{menuName}}
            </h2>
        </div>
        <div>
            <button mat-button class="mat-button text-white pr-4 mr-4 border-r bg-primary" (click)="updateMenu()">Save
            </button>
            <button mat-button class="mat-button text-white bg-warn" (click)="navigateBack()">Cancel</button>
        </div>
    </div>
</div>

<div class="grid grid-row">
    <div>
        <div class="flex items-baseline px-14">
            <h1 class="text-base tracking-wide w-1/12 uppercase">Menu name:</h1>
            <div class="w-11/12">

                <mat-form-field floatLabel="always" appearance="standard" class="min-w-full">
                    <input matInput [(ngModel)]="menuName" />
                    <span matPrefix class="text-2xl text-orange-400">@&nbsp;</span>
                </mat-form-field>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-3 px-6">

        <div class=" px-6 container py-2">

            <div class="flex items-center gap-3">
                <button class="text-white py-2 bg-black px-2   rounded-sm hover:bg-orange-500" (click)="tree.treeModel.expandAll()">Expand all</button>
                <button class="text-white py-2 bg-black px-2   rounded-sm hover:bg-orange-500" (click)="tree.treeModel.collapseAll()">Collapse all</button>
                <mat-form-field appearance="fill" class="h-11 formWidth text-[8px]">
                    <input (keydown.enter)="serach()" placeholder="Serach..." cdkFocusInitial matInput [(ngModel)]="searchNode">
                </mat-form-field>
                <button class=" py-1 bg-white px-3  rounded-sm hover:bg-[#EBEBEB] border" (click)="serach()"><mat-icon class="icon-sm"  svgIcon="mat:search"></mat-icon></button>
                <button class=" py-1 bg-white px-3  rounded-sm hover:bg-[#EBEBEB] border" (click)="reset()"><mat-icon class="icon-sm" svgIcon="mat:autorenew"></mat-icon></button>
            </div>

            <div class="treeHight">
                <tree-root [options]="options" #tree [focused]="true" [nodes]="nodes" (moveNode)="onMoveNode($event)">
                    <ng-template #treeNodeTemplate let-node>
                        <div class="py-1  w-full mat-tree-node  bg-[#F6F6F6] rounded-sm px-2  border border-slate-300" (click)="handleNodeClick(node.data)">
                            <div class="flex justify-between items-center">
                                <div>
                                    <span class="text-base font-medium">{{ getEntityTextByLang(node.data) }}</span>
                                </div>
                                <div class="flex gap-2">
                                    <button mat-icon-button color="primary" (click)="openAddNodeDialog(node.data.node_id)">
                                    <mat-icon matTooltip="Add Child" svgIcon="mat:add"></mat-icon>
                                </button>
                                    <button mat-icon-button color="primary" (click)="openEditNodeDialog(node.data)">
                                    <mat-icon matTooltip="Edit Node" svgIcon="mat:edit"></mat-icon>
                                </button>
                                    <button mat-icon-button color="primary" (click)="openDeleteNodeDialog(node.data)">
                                    <mat-icon matTooltip="Delete Node" svgIcon="mat:delete"></mat-icon>
                                </button>
                                </div>
                            </div>
                        </div>
                    </ng-template>
                </tree-root>
            </div>

        </div>


        <div class="px-6">
            <div class="">
                <div class="card">
                    <div class="border-b h-10 flex items-center justify-center">
                        <h1 class="text-lg font-medium text-orange-400">Synonyms</h1>
                    </div>
                    <div class="min-h-[5rem]">
                    </div>
                </div>
                <div class="pt-4">
                    <button mat-flat-button class="mat-button text-white bg-primary">
                        Add Synonyms
                    </button>
                </div>
            </div>
            <div class="mt-4">
                <mat-form-field *ngIf="selectedNode" appearance="standard" class="min-w-full">
                    <mat-label class="text-lg">Item ID:</mat-label>
                    <input matInput [(ngModel)]="selectedNode.menuItemId" />
                </mat-form-field>
                <div class="card">
                    <div class="border-b h-10 flex items-center justify-center">
                        <h1 class="text-lg font-medium text-orange-400">Actions</h1>
                    </div>
                    <div class="flex items-center bg-center justify-center px-6 w-full">
                        <mat-form-field appearance="standard" class="w-full border-b" *ngIf="selectedNode">
                            <mat-label>Choose an action</mat-label>
                            <mat-select name="actionType" [(ngModel)]="selectedNode?.action.type" (selectionChange)="updateActionType($event.value)">
                                <mat-option value="none">none</mat-option>
                                <mat-option value="text">text</mat-option>
                                <mat-option value="procUtterance">Process Utterance</mat-option>
                                <mat-option value="goToTask">Go To Task</mat-option>
                            </mat-select>
                        </mat-form-field>
                    </div>

                    <div class="flex items-center bg-center justify-center px-6 w-full" *ngIf=" selectedNode?.action.type === 'goToTask' ">
                        <ng-container>
                            <mat-form-field appearance="standard" class="w-full">
                                <mat-label>Select Task</mat-label>
                                <mat-select [(ngModel)]="selectedNode.action.goToTaskId" name="intentId">
                                    <mat-option *ngFor="let task of tasks" [value]="task.intentId">
                                        {{ task.name }}
                                    </mat-option>
                                </mat-select>
                            </mat-form-field>
                        </ng-container>
                    </div>

                    <div *ngIf="selectedNode?.action.type === 'text'" class="px-6 py-2 overflow-auto">
                        <div *ngFor="let response of selectedNode.action.responses">
                            <quill-editor *ngIf="response.language == selectedLang" [(ngModel)]="response.text" #editor [styles]="{ flex: '1 1 auto', minHeight:'100px'}" [required]="true"></quill-editor>
                        </div>
                    </div>

                </div>
            </div>
        </div>

    </div>


</div>
