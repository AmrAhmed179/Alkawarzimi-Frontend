<h2 mat-dialog-title dir="ltr">Confirm</h2>
<mat-dialog-content dir="ltr">{{ data.message }}</mat-dialog-content>
<mat-dialog-actions dir="ltr" align="end">
    <button mat-button (click)="onNoClick()">Cancel</button>
    <button mat-button color="warn" (click)="onYesClick()">Delete</button>
</mat-dialog-actions>
